<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MuzzSnap - V2.1</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700&family=Orbitron:wght@400;900&display=swap');

    :root{
      --muzz-red:#ff0000;
      --ryachu-gold:#ffcc00;
      --itsuki-blue:#00d4ff;

      --dark-bg:#262b31;
      --dark-panel:#12171d;
      --dark-soft:#1b2129;

      --light-bg:#dbeafe;
      --light-panel:#edf6ff;
      --light-soft:#f7fbff;
      --light-border:#bfdcff;
      --light-text:#102033;
    }

    html,body{
      height:100%;
      overflow:hidden;
      margin:0;
      padding:0;
      font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    body.dark-theme{
      background:var(--dark-bg);
      color:#fff;
    }

    body.light-theme{
      background:var(--light-bg);
      color:var(--light-text);
    }

    .panel-3d{
      border-radius:24px;
      transition:all .3s ease;
      display:flex;
      flex-direction:column;
      height:100%;
    }

    .dark-theme .panel-3d{
      background:var(--dark-panel);
      border:1px solid rgba(255,0,0,.14);
      box-shadow:0 10px 30px rgba(0,0,0,.55);
    }

    .light-theme .panel-3d{
      background:var(--light-panel);
      border:1px solid var(--light-border);
      box-shadow:0 10px 30px rgba(80,120,180,.12);
    }

    .bubble-3d{
      padding:12px 16px;
      border-radius:20px;
      font-size:14px;
      max-width:85%;
      line-height:1.4;
      position:relative;
      word-break:break-word;
    }

    .bubble-3d.me{
      background:linear-gradient(145deg,#ff0000,#b30000);
      color:#fff;
      align-self:flex-end;
      border-bottom-right-radius:4px;
    }

    .dark-theme .bubble-3d.other{
      background:var(--dark-soft);
      border:1px solid rgba(255,255,255,.05);
      color:#f3f4f6;
    }

    .light-theme .bubble-3d.other{
      background:var(--light-soft);
      border:1px solid #cfe3ff;
      color:var(--light-text);
    }

    .bubble-3d.muted{opacity:.5}
    .ryachu-name{color:var(--ryachu-gold);font-weight:800}
    .itsuki-name{color:var(--itsuki-blue);font-weight:800}
    .hacker-input{font-family:'Fira Code',monospace}
    .dark-theme .hacker-input{color:#39ff14 !important}
    .light-theme .hacker-input{color:#0f172a !important}

    .emoji-window{
      max-height:180px;
      overflow-y:auto;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:10px;
      padding:15px;
    }

    .emoji-btn{
      font-size:1.5rem;
      cursor:pointer;
      transition:transform .2s;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .emoji-btn:hover{transform:scale(1.15)}

    .custom-scroll::-webkit-scrollbar{width:4px;height:4px}
    .custom-scroll::-webkit-scrollbar-thumb{
      background:var(--muzz-red);
      border-radius:10px;
    }

    .online-indicator{
      width:8px;
      height:8px;
      background:#39ff14;
      border-radius:50%;
      box-shadow:0 0 8px #39ff14;
      flex-shrink:0;
    }

    .admin-btn{
      font-size:10px;
      padding:8px 12px;
      border-radius:8px;
      background:rgba(255,0,0,.1);
      border:1px solid rgba(255,0,0,.3);
      color:#ff0000;
      font-weight:bold;
      transition:all .3s;
      cursor:pointer;
    }

    .admin-btn:hover{
      background:#ff0000;
      color:#fff;
    }
  </style>
</head>
<body class="dark-theme">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: atob('QUl6YVN5QWUxLUpmTmRlME5LSU1kRTdwaGZFWGxtOUphcVVIMGpZ'),
      authDomain: atob('cHVsc2FyaS5maXJlYmFzZWFwcC5jb20='),
      databaseURL: atob('aHR0cHM6Ly9wdWxzYXJpLWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ=='),
      projectId: atob('cHVsc2FyaQ=='),
      storageBucket: atob('cHVsc2FyaS5maXJlYmFzZXN0b3JhZ2UuYXBw'),
      messagingSenderId: atob('ODI0MzA2MzIxMjMz'),
      appId: atob('MTo4MjQzMDYzMjEyMzM6d2ViOjJjOWJmYTAyMTcwYTE3ZDU2MGI1NzA=')
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADMINS = {
      R: atob('MHgyMDgxNTdiNWVjMzk2NzU5ZTg3NTQwNTgxMDhlY2Y1M2UzMjM5MmZm').toLowerCase(),
      I: atob('MHhmYWI1ODM1Y2ExNGZiM2Y5Zjk3OGM1ZTRkNzMzNzM0ZTYzOTRlMDNm').toLowerCase()
    };

    const EMOJI_MAP = {
      FACES:["😊","😂","😉","😍","😘","😛","😅","😢","😭","😠","😈","👽","🤖","🤡","💀","👻","💩"],
      HANDS:["👍","👎","👌","✌️","👏","👋","🙏","💪","☝️","🖖"],
      OBJECTS:["❤️","⭐","🔥","📚","💻","📱","📷","🔑","🔒","💡","💰","💎"],
      NATURE:["☀️","☁️","🌈","🌳","🌸","🌵","🐱","🐶","🦁","🦄","🐉","🐍"],
      FOOD:["🍕","🍔","🌮","🍣","🍰","🍦","☕","🍺","🍷","🍸"],
      ACTIVITIES:["⚽","🏀","🎾","🎵","🎸","🎮","♟️","🎨","🎬"]
    };

    const CHANNELS = [
      { id:"general", name:"GENERAL" },
      { id:"spanish", name:"ESPAÑOL" },
      { id:"dao", name:"DAO" }
    ];

    function App(){
      const [currentUser, setCurrentUser] = useState(null);
      const [messages, setMessages] = useState([]);
      const [onlineUsers, setOnlineUsers] = useState([]);
      const [mutedMap, setMutedMap] = useState({});
      const [pinnedMessage, setPinnedMessage] = useState("");
      const [messageInput, setMessageInput] = useState("");
      const [darkMode, setDarkMode] = useState(true);
      const [emojiOpen, setEmojiOpen] = useState(false);
      const [emojiCategory, setEmojiCategory] = useState("FACES");
      const [activeChannel, setActiveChannel] = useState(CHANNELS[0]);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [banPanelOpen, setBanPanelOpen] = useState(false);
      const [pinMode, setPinMode] = useState(false);
      const [mutePanelOpen, setMutePanelOpen] = useState(false);

      const [customModalOpen, setCustomModalOpen] = useState(false);
      const [customModalData, setCustomModalData] = useState({
        title:"",
        message:"",
        confirmText:"OK",
        cancelText:"",
        onConfirm:null
      });

      const bottomRef = useRef(null);

      const isAdmin = currentUser && (currentUser.role === "ryachu" || currentUser.role === "itsuki");

      const openCustomModal = (data) => {
        setCustomModalData({
          title: data.title || "",
          message: data.message || "",
          confirmText: data.confirmText || "OK",
          cancelText: data.cancelText || "",
          onConfirm: data.onConfirm || null
        });
        setCustomModalOpen(true);
      };

      const closeCustomModal = () => {
        setCustomModalOpen(false);
        setTimeout(() => {
          setCustomModalData({
            title:"",
            message:"",
            confirmText:"OK",
            cancelText:"",
            onConfirm:null
          });
        }, 150);
      };

      const toggleTheme = () => {
        const nextDark = !darkMode;
        setDarkMode(nextDark);
      };

      useEffect(() => {
        document.body.className = darkMode ? "dark-theme" : "light-theme";
      }, [darkMode]);

      useEffect(() => {
        const walletAddress = sessionStorage.getItem("muzz_wallet_address");
        if(!walletAddress){
          window.location.href = "login.html";
          return;
        }

        const boot = (user) => {
          const uid = user.uid;
          const isWallet = !walletAddress.startsWith("guest_");

          let username = "";
          let role = "user";

          if(isWallet){
            const lower = walletAddress.toLowerCase();
            if(lower === ADMINS.R){
              username = "Ryachu";
              role = "ryachu";
            }else if(lower === ADMINS.I){
              username = "Itsuki";
              role = "itsuki";
            }else{
              username = `Node_${walletAddress.slice(-4)}`;
              role = "user";
            }
          }else{
            username = walletAddress.replace("guest_","");
            role = "guest";
          }

          setCurrentUser({
            username,
            uid,
            role,
            isWallet
          });

          db.ref(`status/${uid}`).onDisconnect().remove();
          db.ref(`status/${uid}`).set({
            username,
            role,
            uid,
            wallet: isWallet ? walletAddress : null
          });

          db.ref("status").on("value", snap => {
            setOnlineUsers(snap.val() ? Object.values(snap.val()) : []);
          });

          db.ref("settings/pinned").on("value", snap => {
            setPinnedMessage(snap.val() || "");
          });

          db.ref("muted").on("value", snap => {
            setMutedMap(snap.val() || {});
          });
        };

        firebase.auth().onAuthStateChanged((user) => {
          if(user){
            boot(user);
          }else{
            firebase.auth().signInAnonymously().then((cred) => boot(cred.user));
          }
        });
      }, []);

      useEffect(() => {
        if(!currentUser) return;

        const ref = db.ref("messages/" + activeChannel.id).limitToLast(50);
        ref.on("value", snap => {
          const data = snap.val();
          const list = data
            ? Object.keys(data).map(id => ({ id, ...data[id] }))
            : [];
          setMessages(list);
        });

        return () => ref.off();
      }, [activeChannel, currentUser]);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior:"smooth" });
      }, [messages]);

      const getPermissions = () => {
        try{
          const mode = sessionStorage.getItem("muzz_login_mode") || (currentUser && currentUser.role === "guest" ? "guest" : "wallet");
          const isGuest = mode === "guest" || (currentUser && currentUser.role === "guest");
          const canPrivate = sessionStorage.getItem("muzz_can_private") === "1";
          const canSocial = sessionStorage.getItem("muzz_can_social") === "1";
          const admin = currentUser && (currentUser.role === "ryachu" || currentUser.role === "itsuki");

          return {
            isGuest,
            isAdmin: !!admin,
            canPrivate: admin ? true : canPrivate,
            canSocial: admin ? true : canSocial
          };
        }catch(e){
          return {
            isGuest:true,
            isAdmin:false,
            canPrivate:false,
            canSocial:false
          };
        }
      };

      const gateSection = (kind) => {
        const p = getPermissions();
        if(p.isAdmin) return true;

        const locked = kind === "private" ? !p.canPrivate : !p.canSocial;
        if(!locked) return true;

        if(p.isGuest){
          openCustomModal({
            title: kind === "private" ? "PRIVATE LOCKED" : "SOCIAL LOCKED",
            message: "Connect your wallet to unlock this section. Minimum required: 10,000,000 MUZZ (wallet balance or staked in Team Finance).",
            cancelText: "Close",
            confirmText: "Connect Wallet",
            onConfirm: () => { window.location.href = "login.html"; }
          });
        }else{
          openCustomModal({
            title: kind === "private" ? "PRIVATE LOCKED" : "SOCIAL LOCKED",
            message: "Minimum required: 10,000,000 MUZZ (wallet balance or staked in Team Finance). Your current wallet does not meet the requirement for this section.",
            confirmText: "Understood"
          });
        }

        return false;
      };

      const goPrivate = () => {
        if(!gateSection("private")) return;
        window.location.href = "private.html";
      };

      const goSocial = () => {
        if(!gateSection("social")) return;
        window.location.href = "social.html";
      };

      const sendMessage = () => {
        if(!messageInput.trim()) return;

        if(mutedMap[currentUser.uid] && mutedMap[currentUser.uid] > Date.now()){
          alert("Estás silenciado temporalmente");
          return;
        }

        if(pinMode && isAdmin){
          db.ref("settings/pinned").set(messageInput);
          setPinMode(false);
          setMessageInput("");
          return;
        }

        db.ref("messages/" + activeChannel.id).push({
          content: messageInput,
          username: currentUser.username,
          role: currentUser.role,
          userId: currentUser.uid,
          timestamp: Date.now()
        });

        setMessageInput("");
        setEmojiOpen(false);
      };

      const adminActions = {
        clearChat: () => {
          if(confirm("¿Borrar todo el historial del chat?")){
            db.ref("messages/" + activeChannel.id).remove();
          }
        },
        enablePinMode: () => {
          setPinMode(true);
          setMessageInput("");
        },
        removePin: () => db.ref("settings/pinned").remove(),
        openBanPanel: () => setBanPanelOpen(true),
        openMutePanel: () => setMutePanelOpen(true),
        banUser: (uid, username) => {
          if(confirm(`¿Banear permanentemente a ${username}?`)){
            db.ref(`banned/${uid}`).set(true);
            db.ref(`status/${uid}`).remove();
          }
          setBanPanelOpen(false);
        },
        muteUser: (uid, username) => {
          const until = Date.now() + 60000;
          db.ref(`muted/${uid}`).set(until);
          setTimeout(() => db.ref(`muted/${uid}`).remove(), 60000);
          alert(`${username} ha sido silenciado por 1 minuto`);
          setMutePanelOpen(false);
        }
      };

      const formatDividerDate = (dateObj) => {
        const now = new Date();
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);

        if(dateObj.toDateString() === now.toDateString()) return "HOY";
        if(dateObj.toDateString() === yesterday.toDateString()) return "AYER";

        return dateObj.toLocaleDateString("es-ES", {
          weekday:"long",
          year:"numeric",
          month:"long",
          day:"numeric"
        }).toUpperCase();
      };

      if(!currentUser){
        return (
          <div className="h-full flex items-center justify-center text-red-600 font-orbitron animate-pulse">
            CONNECTING...
          </div>
        );
      }

      return (
        <div className="flex h-screen p-2 md:p-4 lg:p-6 gap-4 md:gap-6 max-w-[1600px] mx-auto overflow-hidden">
          <aside className={`fixed lg:relative z-50 inset-y-0 left-0 w-72 lg:w-64 transition-all duration-300 transform panel-3d p-6 flex flex-col ${sidebarOpen ? "translate-x-0" : "-translate-x-full lg:translate-x-0 shadow-2xl lg:shadow-none"}`}>
            <div className="mb-8 flex items-center gap-3">
              <div className="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-600/30">
                <i className="fas fa-ghost text-white text-sm"></i>
              </div>
              <h1 className="font-orbitron font-black text-xl italic tracking-tighter">
                MUZZ<span className="text-red-600">SNAP</span>
              </h1>
            </div>

            <div className="flex-1 overflow-y-auto custom-scroll space-y-8 pr-2">
              {isAdmin && (
                <div>
                  <p className="text-[9px] text-red-600 font-bold tracking-[0.3em] mb-4 uppercase">Admin Console</p>

                  <div className="grid grid-cols-2 gap-2 mb-3">
                    <button onClick={adminActions.enablePinMode} className="admin-btn">
                      <i className="fas fa-thumbtack mr-1"></i>FIJAR
                    </button>
                    <button onClick={adminActions.clearChat} className="admin-btn">
                      <i className="fas fa-trash mr-1"></i>LIMPIAR
                    </button>
                  </div>

                  <details className="bg-red-600/5 border border-red-600/20 rounded-lg">
                    <summary className="cursor-pointer px-3 py-2 text-[9px] font-bold text-red-500 uppercase tracking-wider">
                      Moderación ▼
                    </summary>
                    <div className="p-3 space-y-2 border-t border-red-600/20">
                      <button onClick={adminActions.openBanPanel} className="w-full admin-btn text-left">
                        <i className="fas fa-user-slash mr-2"></i>Banear Usuario
                      </button>
                      <button onClick={adminActions.openMutePanel} className="w-full admin-btn text-left">
                        <i className="fas fa-volume-mute mr-2"></i>Mutear 1min
                      </button>
                    </div>
                  </details>
                </div>
              )}

              <div>
                <p className="text-[10px] text-gray-500 font-bold tracking-[0.3em] mb-4 uppercase">Channels</p>
                {CHANNELS.map(channel => (
                  <button
                    key={channel.id}
                    onClick={() => {
                      setActiveChannel(channel);
                      setSidebarOpen(false);
                    }}
                    className={`w-full text-left px-4 py-3 rounded-xl text-xs font-bold mb-1 transition-all ${
                      activeChannel.id === channel.id
                        ? "bg-red-600/10 text-red-600 border-l-2 border-red-600 shadow-lg shadow-red-600/5"
                        : "text-gray-500 hover:text-white"
                    }`}
                  >
                    # {channel.name}
                  </button>
                ))}
              </div>

              <div>
                <p className="text-[10px] text-gray-500 font-bold tracking-[0.3em] mb-4 uppercase">Sections</p>

                <button
                  onClick={() => { goPrivate(); setSidebarOpen(false); }}
                  className="w-full text-left px-4 py-3 rounded-xl text-xs font-bold mb-1 transition-all text-gray-500 hover:text-white"
                >
                  <i className="fas fa-user-secret mr-2 text-red-600"></i>Private
                </button>

                <button
                  onClick={() => { goSocial(); setSidebarOpen(false); }}
                  className="w-full text-left px-4 py-3 rounded-xl text-xs font-bold mb-1 transition-all text-gray-500 hover:text-white"
                >
                  <i className="fas fa-globe mr-2 text-red-600"></i>Social
                </button>

                <div className="text-[9px] text-gray-600 font-mono leading-snug mt-2">
                  Guest: chat-only. Wallet: needs 10M MUZZ (balance or staked) to unlock.
                </div>
              </div>

              <div>
                <p className="text-[10px] text-gray-500 font-bold tracking-[0.3em] mb-4 uppercase">
                  Online — {onlineUsers.length}
                </p>

                <div className="space-y-3">
                  {onlineUsers.map((user, index) => (
                    <div key={index} className="flex items-center gap-3 px-2">
                      <span className="online-indicator"></span>
                      <span className={`text-[11px] truncate font-bold uppercase flex-1 ${
                        user.role === "ryachu"
                          ? "ryachu-name"
                          : user.role === "itsuki"
                          ? "itsuki-name"
                          : "text-gray-400"
                      }`}>
                        {user.role === "ryachu" && "👑 "}
                        {user.role === "itsuki" && "💎 "}
                        {user.username}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <button
              onClick={() => {
                sessionStorage.clear();
                window.location.href = "login.html";
              }}
              className="mt-6 w-full py-3 text-[10px] border border-red-900/30 text-red-600 rounded-xl uppercase font-black tracking-widest hover:bg-red-600/5 transition-all"
            >
              <i className="fas fa-power-off mr-2"></i>Disconnect
            </button>
          </aside>

          <main className="flex-1 panel-3d flex flex-col overflow-hidden border border-white/5 h-full relative">
            {pinnedMessage && (
              <div className="bg-red-600/10 border-b border-red-600/30 py-2 px-6 flex items-center gap-4 flex-shrink-0">
                <i className="fas fa-thumbtack text-red-600 text-[10px] animate-pulse"></i>
                <marquee className="text-[10px] font-bold tracking-[0.2em] text-red-500 uppercase flex-1">
                  {pinnedMessage}
                </marquee>
                {isAdmin && (
                  <button onClick={adminActions.removePin} className="text-[8px] text-red-400 hover:text-red-600">
                    <i className="fas fa-times"></i>
                  </button>
                )}
              </div>
            )}

            <header className={`h-16 flex items-center justify-between px-8 border-b flex-shrink-0 ${darkMode ? "bg-black/10 border-white/5" : "bg-[#eaf4ff] border-[#cfe3ff]"}`}>
              <div className="flex items-center gap-4">
                <button onClick={() => setSidebarOpen(true)} className="lg:hidden text-red-600">
                  <i className="fas fa-bars"></i>
                </button>
                <h2 className="text-sm font-black tracking-[0.2em] text-red-600 uppercase italic">
                  / {activeChannel.name}
                </h2>
              </div>

              <button
                onClick={toggleTheme}
                className="w-10 h-10 rounded-xl border border-red-600/20 flex items-center justify-center hover:bg-red-600/5 transition-all"
              >
                {darkMode ? <i className="fas fa-sun text-yellow-500"></i> : <i className="fas fa-moon text-blue-500"></i>}
              </button>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-5 custom-scroll">
              {messages.map((msg, index) => {
                const muted = mutedMap[msg.userId] && mutedMap[msg.userId] > Date.now();
                const currentDate = new Date(msg.timestamp);
                const prev = index > 0 ? messages[index - 1] : null;
                const prevDate = prev ? new Date(prev.timestamp) : null;
                const showDivider = !prevDate || currentDate.toDateString() !== prevDate.toDateString();

                return (
                  <React.Fragment key={msg.id}>
                    {showDivider && (
                      <div className="flex items-center gap-4 my-4">
                        <div className="flex-1 h-px bg-gradient-to-r from-transparent via-red-600/30 to-transparent"></div>
                        <span className="text-[9px] font-black tracking-[0.3em] text-red-600/70 px-4 py-1.5 bg-red-600/5 rounded-full border border-red-600/20">
                          {formatDividerDate(currentDate)}
                        </span>
                        <div className="flex-1 h-px bg-gradient-to-r from-red-600/30 via-transparent to-transparent"></div>
                      </div>
                    )}

                    <div className={`flex flex-col ${msg.userId === currentUser.uid ? "items-end" : "items-start"}`}>
                      <span className={`text-[10px] font-black mb-1.5 uppercase px-2 ${
                        msg.role === "ryachu"
                          ? "ryachu-name"
                          : msg.role === "itsuki"
                          ? "itsuki-name"
                          : "text-gray-500"
                      }`}>
                        {msg.role === "ryachu" && "👑 "}
                        {msg.role === "itsuki" && "💎 "}
                        {msg.username} {muted && "🔇"}
                      </span>

                      <div className={`bubble-3d shadow-xl ${msg.userId === currentUser.uid ? "me" : "other"} ${muted ? "muted" : ""}`}>
                        {msg.content}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
              <div ref={bottomRef}></div>
            </div>

            <div className={`p-4 md:p-6 border-t flex-shrink-0 ${darkMode ? "bg-[#151a20] border-white/5" : "bg-[#dbeafe] border-[#bfdcff]"}`}>
              {pinMode && (
                <div className="mb-3 px-4 py-2 bg-yellow-500/10 border border-yellow-500/30 rounded-lg text-yellow-500 text-xs font-bold flex items-center gap-2">
                  <i className="fas fa-thumbtack animate-pulse"></i>
                  MODO FIJAR MENSAJE ACTIVADO - Escribe y envía
                  <button onClick={() => setPinMode(false)} className="ml-auto text-yellow-500 hover:text-yellow-300">
                    <i className="fas fa-times"></i>
                  </button>
                </div>
              )}

              {banPanelOpen && (
                <div className="mb-3 panel-3d border border-red-600/30 p-4 max-h-48 overflow-y-auto custom-scroll">
                  <div className="flex justify-between items-center mb-3">
                    <p className="text-xs font-bold text-red-500 uppercase">Seleccionar usuario para banear</p>
                    <button onClick={() => setBanPanelOpen(false)} className="text-gray-500 hover:text-red-500">
                      <i className="fas fa-times"></i>
                    </button>
                  </div>

                  {onlineUsers
                    .filter(user => user.role !== "ryachu" && user.role !== "itsuki")
                    .map(user => (
                      <button
                        key={user.uid}
                        onClick={() => adminActions.banUser(user.uid, user.username)}
                        className="w-full text-left px-3 py-2 text-xs hover:bg-red-600/10 rounded mb-1 flex items-center gap-2"
                      >
                        <i className="fas fa-user-slash text-red-500"></i>
                        <span className="font-bold">{user.username}</span>
                      </button>
                    ))}
                </div>
              )}

              {mutePanelOpen && (
                <div className="mb-3 panel-3d border border-yellow-600/30 p-4 max-h-48 overflow-y-auto custom-scroll">
                  <div className="flex justify-between items-center mb-3">
                    <p className="text-xs font-bold text-yellow-500 uppercase">Seleccionar usuario para mutear</p>
                    <button onClick={() => setMutePanelOpen(false)} className="text-gray-500 hover:text-yellow-500">
                      <i className="fas fa-times"></i>
                    </button>
                  </div>

                  {onlineUsers
                    .filter(user => user.role !== "ryachu" && user.role !== "itsuki")
                    .map(user => (
                      <button
                        key={user.uid}
                        onClick={() => adminActions.muteUser(user.uid, user.username)}
                        className="w-full text-left px-3 py-2 text-xs hover:bg-yellow-600/10 rounded mb-1 flex items-center gap-2"
                      >
                        <i className="fas fa-volume-mute text-yellow-500"></i>
                        <span className="font-bold">{user.username}</span>
                      </button>
                    ))}
                </div>
              )}

              {emojiOpen && (
                <div className={`mb-4 panel-3d border overflow-hidden shadow-2xl h-auto flex-shrink-0 ${darkMode ? "border-red-600/20" : "border-[#bfdcff]"}`}>
                  <div className="flex bg-black/10 border-b border-white/5 overflow-x-auto custom-scroll">
                    {Object.keys(EMOJI_MAP).map(category => (
                      <button
                        key={category}
                        onClick={() => setEmojiCategory(category)}
                        className={`px-4 py-2 text-[9px] font-black uppercase tracking-tighter ${
                          emojiCategory === category ? "text-red-600 bg-red-600/5" : "text-gray-500"
                        }`}
                      >
                        {category}
                      </button>
                    ))}
                  </div>

                  <div className="emoji-window custom-scroll">
                    {EMOJI_MAP[emojiCategory].map(emoji => (
                      <span key={emoji} onClick={() => setMessageInput(messageInput + emoji)} className="emoji-btn">
                        {emoji}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              <div className={`flex items-center rounded-2xl p-2.5 pl-5 focus-within:border-red-600/50 transition-all shadow-inner ${darkMode ? "bg-[#0d1116] border border-white/10" : "bg-[#f7fbff] border border-[#bfdcff]"}`}>
                <button
                  onClick={() => setEmojiOpen(!emojiOpen)}
                  className="text-gray-500 hover:text-red-600 transition-colors mr-3"
                >
                  <i className="far fa-laugh-beam text-xl"></i>
                </button>

                <input
                  value={messageInput}
                  onChange={(e) => setMessageInput(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && sendMessage()}
                  placeholder={
                    pinMode
                      ? "Escribe el mensaje a fijar..."
                      : mutedMap[currentUser.uid] && mutedMap[currentUser.uid] > Date.now()
                      ? "Estás silenciado..."
                      : "Transmit message..."
                  }
                  disabled={mutedMap[currentUser.uid] && mutedMap[currentUser.uid] > Date.now()}
                  className="flex-1 bg-transparent border-none focus:ring-0 text-sm hacker-input outline-none"
                />

                <button
                  onClick={sendMessage}
                  className={`w-12 h-12 ${pinMode ? "bg-yellow-600" : "bg-red-600"} rounded-xl flex items-center justify-center hover:bg-red-500 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,0,0,0.3)]`}
                >
                  <i className={`fas ${pinMode ? "fa-thumbtack" : "fa-paper-plane"} text-white`}></i>
                </button>
              </div>
            </div>
          </main>

          {sidebarOpen && (
            <div
              onClick={() => setSidebarOpen(false)}
              className="fixed inset-0 bg-black/90 z-40 lg:hidden backdrop-blur-md"
            ></div>
          )}

          {customModalOpen && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
              <div className="w-full max-w-md rounded-[28px] border border-red-600/30 bg-[#111] shadow-[0_0_40px_rgba(255,0,0,0.15)] overflow-hidden">
                <div className="px-6 pt-6 pb-4 border-b border-red-600/20">
                  <div className="flex items-center gap-3">
                    <div className="w-11 h-11 rounded-2xl bg-red-600/15 border border-red-600/30 flex items-center justify-center">
                      <i className="fas fa-lock text-red-500 text-lg"></i>
                    </div>
                    <div>
                      <div className="text-[11px] tracking-[0.35em] uppercase text-red-500 font-black">MuzzSnap</div>
                      <div className="text-xl font-black text-white uppercase">{customModalData.title}</div>
                    </div>
                  </div>
                </div>

                <div className="px-6 py-5">
                  <p className="text-sm leading-6 text-gray-300">{customModalData.message}</p>

                  <div className="mt-5 rounded-2xl border border-white/10 bg-black/30 px-4 py-3">
                    <div className="text-[10px] tracking-[0.28em] uppercase text-gray-500 font-bold mb-1">Access Rule</div>
                    <div className="text-sm text-white font-semibold">10,000,000 MUZZ minimum</div>
                    <div className="text-xs text-gray-400 mt-1">Wallet balance or staked in Team Finance</div>
                  </div>
                </div>

                <div className="px-6 pb-6 flex gap-3">
                  {customModalData.cancelText ? (
                    <button
                      onClick={closeCustomModal}
                      className="flex-1 h-12 rounded-2xl border border-white/10 bg-white/5 text-gray-300 font-black uppercase tracking-[0.2em] hover:bg-white/10 transition-all"
                    >
                      {customModalData.cancelText}
                    </button>
                  ) : null}

                  <button
                    onClick={() => {
                      const handler = customModalData.onConfirm;
                      closeCustomModal();
                      if(typeof handler === "function") handler();
                    }}
                    className={`${customModalData.cancelText ? "flex-1" : "w-full"} h-12 rounded-2xl bg-red-600 text-white font-black uppercase tracking-[0.2em] hover:bg-red-500 transition-all shadow-[0_0_20px_rgba(255,0,0,0.25)]`}
                  >
                    {customModalData.confirmText || "OK"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
