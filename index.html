<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MuzzSnap | Protocol</title>

  <script>
    if (window.top !== window.self) {
      window.top.location.replace(window.self.location.href);
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Fira+Code&display=swap');
    body { background:#050505; color:#fff; height:100vh; display:flex; align-items:center; justify-content:center; margin:0; }
    .logo-glow{ box-shadow:0 0 40px rgba(255,0,0,.2); border:1px solid rgba(255,255,255,.1); transition:.3s; cursor:pointer; }
    .logo-glow:active{ transform:scale(.95); }
    .loading-spinner{ animation:spin 1s linear infinite; border:3px solid transparent; border-top-color:#ff0000; border-radius:50%; }
    .hacker-input{ font-family:'Fira Code', monospace; background:rgba(255,255,255,.03); border:1px solid rgba(255,0,0,.2); color:#39ff14; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
  </style>
</head>

<body>
  <div class="text-center px-6 w-full max-w-sm">
    <div id="btnConnect" class="relative inline-block mb-6">
      <div id="loadingUI" class="hidden absolute inset-0 z-20 flex items-center justify-center bg-black/50 rounded-3xl">
        <div class="loading-spinner w-12 h-12"></div>
      </div>
      <img
        src="https://img1.wsimg.com/isteam/ip/ac9578cb-a6ce-417e-8ad5-b2d6701462eb/1000030902.png/:/rs=w:1440,h:1440"
        class="logo-glow w-32 h-32 md:w-40 md:h-40 rounded-3xl"
        alt="MuzzSnap"
      />
    </div>

    <h1 style="font-family:'Orbitron';" class="text-2xl font-black tracking-tighter italic mb-1">
      MUZZ<span class="text-red-600">SNAP</span>
    </h1>
    <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mb-8">
      Tap logo for Wallet or use Guest below
    </p>

    <div class="space-y-4 mb-8">
      <input type="text" id="usernameInput" placeholder="ENTER_NICKNAME..."
        class="w-full p-3 rounded-xl hacker-input text-center text-xs border-dashed" autocomplete="off" />
      <button id="btnGuest"
        class="w-full py-2 text-[9px] font-bold text-gray-500 hover:text-red-500 uppercase tracking-widest transition-colors">
        [ Initialize Guest Protocol ]
      </button>
    </div>

    <div id="errorBox" class="hidden p-3 rounded-lg bg-red-900/20 border border-red-500/50 mb-4">
      <p id="errorTitle" class="text-red-500 text-[10px] font-bold uppercase mb-1"></p>
      <p id="errorDesc" class="text-gray-400 text-[10px] leading-tight"></p>
    </div>

    <button id="btnOpenMetamask"
      class="hidden w-full py-2 mb-6 text-[9px] font-black uppercase tracking-widest rounded-xl border border-red-600/40 text-red-400 hover:bg-red-600/10 transition">
      Open in MetaMask (optional)
    </button>

    <div class="text-[9px] text-gray-700 font-mono uppercase tracking-widest">
      &copy; 2026 Protocol Ryachu Edition
    </div>
  </div>

  <script>
    // ==== Firebase init (igual a tu chat) ====
    const _fb = {
      apiKey: atob('QUl6YVN5QWUxLUpmTmRlME5LSU1kRTdwaGZFWGxtOUphcVVIMGpZ'),
      authDomain: atob('cHVsc2FyaS5maXJlYmFzZWFwcC5jb20='),
      databaseURL: atob('aHR0cHM6Ly9wdWxzYXJpLWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ=='),
      projectId: atob('cHVsc2FyaQ=='),
      storageBucket: atob('cHVsc2FyaS5maXJlYmFzZXN0b3JhZ2UuYXBw'),
      messagingSenderId: atob('ODI0MzA2MzIxMjMz'),
      appId: atob('MTo4MjQzMDYzMjEyMzM6d2ViOjJjOWJmYTAyMTcwYTE3ZDU2MGI1NzA=')
    };
    if (!firebase.apps.length) firebase.initializeApp(_fb);

    const loadingUI = document.getElementById('loadingUI');
    const errorBox = document.getElementById('errorBox');
    const btnOpenMetamask = document.getElementById('btnOpenMetamask');

    function setLoading(on){ loadingUI.classList.toggle('hidden', !on); }
    function showError(t,d){
      errorBox.classList.remove('hidden');
      document.getElementById('errorTitle').innerText = t;
      document.getElementById('errorDesc').innerText = d;
      setLoading(false);
    }
    function clearError(){ errorBox.classList.add('hidden'); }

    function goChat(){
      // cache-bust para evitar “pantalla negra” por cache en GoDaddy/móvil
      const v = Date.now();
      window.location.replace(`chat.html?v=${v}`);
    }

    async function ensureAnonAuth(){
      return new Promise((resolve)=>{
        firebase.auth().onAuthStateChanged(async (u)=>{
          if (u) return resolve(true);
          try { await firebase.auth().signInAnonymously(); } catch(e) {}
          resolve(true);
        });
      });
    }

    function openInMetamask(){
      const dappUrl = window.location.href.replace(/^https?:\/\//, "");
      window.location.href = `https://metamask.app.link/dapp/${dappUrl}`;
    }
    btnOpenMetamask.addEventListener("click", openInMetamask);

    async function accessWithWallet(){
      clearError();
      setLoading(true);

      await ensureAnonAuth();

      if (typeof window.ethereum === 'undefined') {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        btnOpenMetamask.classList.toggle('hidden', !isMobile);
        showError("NO_WALLET", "No Web3 wallet detected in this browser. Use Guest or optionally open in MetaMask.");
        return;
      }

      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        const wallet = accounts[0];

        // Guardar EXACTO la key que chat.html espera:
        sessionStorage.setItem('muzz_wallet_address', wallet);

        // Ir al chat
        goChat();
      } catch (err) {
        console.error(err);
        showError("AUTH_FAILED", "Wallet connection rejected or failed.");
      } finally {
        setLoading(false);
      }
    }

    function accessWithGuest(){
      clearError();
      const user = (document.getElementById('usernameInput').value || '').trim();
      if(!user){ showError("REQUIRED", "Ingresa un nickname."); return; }
      sessionStorage.setItem('muzz_wallet_address', `guest_${user}`);
      goChat();
    }

    document.getElementById('btnConnect').addEventListener('click', accessWithWallet);
    document.getElementById('btnGuest').addEventListener('click', accessWithGuest);
  </script>
</body>
</html>
